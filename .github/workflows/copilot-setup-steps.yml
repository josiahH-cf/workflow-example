# Copilot Coding Agent — Setup Steps
# Runs before every Copilot agent session to install dependencies and configure environment.
name: "Copilot Setup Steps"
on: workflow_dispatch

concurrency:
  group: copilot-setup
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # [PROJECT-SPECIFIC] — Replace with your project's install command
      # Example for Node.js:
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
      # - run: npm ci

      # Example for Python:
      # - uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.12'
      # - run: pip install -r requirements.txt

      - name: Verify setup
        run: echo "Environment ready for Copilot Coding Agent"

      - name: Install dependencies
        run: |
          set -euo pipefail
          eval "$INSTALL_CMD"

      - name: Build project
        run: |
          set -euo pipefail
          eval "$BUILD_CMD"

      - name: Lint project
        run: |
          set -euo pipefail
          eval "$LINT_CMD"

      - name: Run tests
        run: |
          set -euo pipefail
          eval "$TEST_CMD"
